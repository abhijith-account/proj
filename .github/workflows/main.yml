name: Zephyr Firmware CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  build-test-qemu:
    runs-on: ubuntu-latest
    container: zephyrprojectrtos/ci:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize Zephyr workspace
        run: |
          west init -l .
          west update
          west zephyr-export

          SDK_DIR=$(ls -d /opt/toolchains/zephyr-sdk-* | head -n 1)
          echo "Using Zephyr SDK: $SDK_DIR"
          $SDK_DIR/setup.sh -c

      - name: Install required packages
        run: |
          apt-get update
          apt-get install -y \
            qemu-system-arm \
            cmake \
            make \
            gcc \
            g++ \
            lcov \
            gcovr \
            libgtest-dev \
            binutils

      - name: Build olimex_stm32_h405 QEMU smoke image
        run: |
          # Build for QEMU-supported STM32F405 board.
          # QEMU machine: olimex-stm32-h405
          west build -b olimex_stm32_h405 . --pristine

          echo ""
          echo "===== VERIFY BOOT MARKER EXISTS IN IMAGE ====="
          strings build/zephyr/zephyr.elf | grep "QEMU_BOOT_MARKER" || true

          echo ""
          echo "===== QEMU SMOKE CONFIG CHECK ====="
          grep -E "CONFIG_SEMIHOST|CONFIG_PRINTK|CONFIG_SERIAL|CONFIG_CONSOLE|CONFIG_UART_CONSOLE|CONFIG_LOG|CONFIG_GPIO|CONFIG_ENTROPY_GENERATOR|CONFIG_TEST_RANDOM_GENERATOR|CONFIG_I2C|CONFIG_SENSOR|CONFIG_WATCHDOG|CONFIG_PM|CONFIG_FLASH|CONFIG_NVS" build/zephyr/.config || true

          echo ""
          echo "===== GENERATED DTS CHOSEN NODE ====="
          awk '/chosen {/,/};/' build/zephyr/zephyr.dts || true

          echo ""
          echo "===== CHECK FOR UNWANTED STM32 DRIVERS IN BUILD ====="
          echo "--- entropy_stm32 ---"
          grep -R "entropy_stm32" build/zephyr 2>/dev/null || true

          echo "--- gpio_stm32 ---"
          grep -R "gpio_stm32" build/zephyr 2>/dev/null || true

          echo "--- uart_stm32 ---"
          grep -R "uart_stm32" build/zephyr 2>/dev/null || true

      - name: Run olimex_stm32_h405 in QEMU with semihosting
        run: |
          rm -f qemu_execution_report.txt
          rm -f qemu_stderr.log
          rm -f qemu_semihost.log

          set +e
          timeout 20s qemu-system-arm \
            -machine olimex-stm32-h405 \
            -cpu cortex-m4 \
            -display none \
            -monitor none \
            -semihosting-config enable=on,target=native \
            -kernel build/zephyr/zephyr.elf \
            > qemu_semihost.log 2> qemu_stderr.log

          EXIT_CODE=$?
          set -e

          {
            echo "===== QEMU STDERR ====="
            cat qemu_stderr.log || true
            echo ""

            echo "===== QEMU SEMIHOST OUTPUT ====="
            cat qemu_semihost.log || true
            echo ""

            echo "===== EXIT CODE ====="
            echo "$EXIT_CODE"
          } > qemu_execution_report.txt

          cat qemu_execution_report.txt

          if grep -aEq "QEMU_BOOT_MARKER" qemu_execution_report.txt; then
            echo "QEMU semihost logs captured successfully."
            exit 0
          fi

          if [ "$EXIT_CODE" -eq 124 ]; then
            echo "QEMU reached timeout, but semihost boot marker was not captured."
            echo "This means firmware still did not reach main(), or semihosting output is not active early enough."
            exit 1
          elif [ "$EXIT_CODE" -eq 0 ]; then
            echo "QEMU exited normally, but semihost boot marker was not captured."
            exit 1
          else
            echo "Firmware crashed or QEMU failed with code $EXIT_CODE."
            exit 1
          fi

      - name: Upload QEMU execution logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: QEMU-Execution-Logs
          path: |
            qemu_execution_report.txt
            qemu_stderr.log
            qemu_semihost.log
          if-no-files-found: ignore

      - name: Build and run host unit tests
        run: |
          if [ -f tests/CMakeLists.txt ]; then
            mkdir -p tests/build
            cd tests/build

            cmake ..
            make -j$(nproc)

            if [ -f ./run_pm_tests ]; then ./run_pm_tests; fi
            if [ -f ./run_usb_shell_tests ]; then ./run_usb_shell_tests; fi
            if [ -f ./run_battery_tests ]; then ./run_battery_tests; fi
            if [ -f ./run_static_memory_tests ]; then ./run_static_memory_tests; fi
            if [ -f ./run_config_tests ]; then ./run_config_tests; fi
            if [ -f ./run_i2c_faults_tests ]; then ./run_i2c_faults_tests; fi
            if [ -f ./run_state_machine_tests ]; then ./run_state_machine_tests; fi
            if [ -f ./run_sync_tests ]; then ./run_sync_tests; fi
            if [ -f ./run_command_tests ]; then ./run_command_tests; fi
          else
            echo "tests/CMakeLists.txt not found. Skipping host unit tests."
          fi

      - name: Enforce coverage
        run: |
          if [ -f ./scripts/check_coverage.sh ]; then
            chmod +x ./scripts/check_coverage.sh
            ./scripts/check_coverage.sh
          else
            echo "Coverage script not found. Skipping coverage enforcement."
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Coverage-Dashboard
          path: coverage_report/
          if-no-files-found: ignore
