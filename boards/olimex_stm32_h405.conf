# boards/olimex_stm32_h405.conf

# QEMU does not emulate USB device stack for this STM32 board.
CONFIG_USB_DEVICE_STACK=n

# Serial console/logging for QEMU.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_BOOT_BANNER=y

# Logging.
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_IMMEDIATE=y

# Required because USB_CDC_Virtual_COM_Shell_Interface.cpp uses:
# uart_irq_update()
# uart_irq_rx_enable()
# uart_irq_callback_user_data_set()
# uart_fifo_read()
CONFIG_UART_INTERRUPT_DRIVEN=y

# Required because code uses uart_line_ctrl_get().
CONFIG_UART_LINE_CTRL=y

# Disable Zephyr's built-in serial shell backend in QEMU.
# Your application already implements its own shell facade.
CONFIG_SHELL_BACKEND_SERIAL=n
