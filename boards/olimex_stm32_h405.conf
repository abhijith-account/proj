# boards/olimex_stm32_h405.conf

# QEMU smoke profile for olimex_stm32_h405.
# Purpose: reach main() and prove QEMU execution through semihosting.

CONFIG_CPP=y
CONFIG_STD_CPP20=y

# Semihosting output path
CONFIG_SEMIHOST=y
CONFIG_PRINTK=y

# Disable UART/console/logging for QEMU smoke test
CONFIG_SERIAL=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_LOG=n
CONFIG_LOG_BACKEND_UART=n

# Disable shell
CONFIG_SHELL=n
CONFIG_SHELL_BACKEND_SERIAL=n

# Disable USB
CONFIG_USB_DEVICE_STACK=n
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=n

# Disable random/entropy hardware.
# Your log still shows entropy_stm32.c being compiled; this must be removed.
CONFIG_ENTROPY_GENERATOR=n
CONFIG_TEST_RANDOM_GENERATOR=n

# Disable GPIO and GPIO-driven board devices
CONFIG_GPIO=n

# Disable hardware blocks not needed for semihost smoke boot
CONFIG_I2C=n
CONFIG_SENSOR=n
CONFIG_COUNTER=n
CONFIG_COUNTER_RTC_STM32=n
CONFIG_WATCHDOG=n
CONFIG_PM=n
CONFIG_PM_DEVICE=n
CONFIG_FLASH=n
CONFIG_FLASH_PAGE_LAYOUT=n
CONFIG_NVS=n
CONFIG_MPU_ALLOW_FLASH_WRITE=n
CONFIG_REBOOT=n

# Disable debug extras
CONFIG_THREAD_ANALYZER=n
CONFIG_THREAD_ANALYZER_RUN_UNLOCKED=n
CONFIG_THREAD_NAME=n

# Keep minimal memory
CONFIG_HEAP_MEM_POOL_SIZE=0
