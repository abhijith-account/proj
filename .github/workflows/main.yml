name: Zephyr Firmware CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  build-test-qemu:
    runs-on: ubuntu-latest
    container: zephyrprojectrtos/ci:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize Zephyr workspace
        run: |
          west init -l .
          west update
          west zephyr-export

          SDK_DIR=$(ls -d /opt/toolchains/zephyr-sdk-* | head -n 1)
          echo "Using Zephyr SDK: $SDK_DIR"
          $SDK_DIR/setup.sh -c

      - name: Install required packages
        run: |
          apt-get update
          apt-get install -y \
            qemu-system-arm \
            cmake \
            make \
            gcc \
            g++ \
            lcov \
            gcovr \
            libgtest-dev \
            binutils

      - name: Build YOUR firmware for olimex_stm32_h405 with startup probe
        run: |
          # This builds your real firmware.
          # QEMU_RUNTIME_PROBE only adds startup probe markers inside your own firmware.
          west build -b olimex_stm32_h405 . --pristine -- -DQEMU_RUNTIME_PROBE=ON

          echo ""
          echo "===== YOUR FIRMWARE IMAGE ====="
          ls -lh build/zephyr/zephyr.elf || true
          ls -lh build/zephyr/zephyr.bin || true

          echo ""
          echo "===== VERIFY PROBE / APPLICATION STRINGS EXIST IN YOUR ELF ====="
          strings build/zephyr/zephyr.elf | grep -E "QEMU_PROBE_PRE_KERNEL_1|QEMU_PROBE_PRE_KERNEL_2|QEMU_PROBE_POST_KERNEL|QEMU_PROBE_APPLICATION_INIT|QEMU_BOOT_MARKER_ACTUAL_MAIN|QEMU_BOOT_MARKER_PRINTK|Command-Based RTOS Booting|MAIN_OS|SIM_I2C|Display Consumer" || true

          echo ""
          echo "===== CONFIG SNAPSHOT ====="
          grep -E "CONFIG_BOARD|CONFIG_SERIAL|CONFIG_CONSOLE|CONFIG_UART_CONSOLE|CONFIG_LOG|CONFIG_LOG_BACKEND_UART|CONFIG_PRINTK|CONFIG_SHELL|CONFIG_USB|CONFIG_I2C|CONFIG_WATCHDOG|CONFIG_NVS|CONFIG_PM|CONFIG_FLASH|CONFIG_COUNTER|CONFIG_SEMIHOST" build/zephyr/.config || true

          echo ""
          echo "===== DEVICETREE CHOSEN NODE ====="
          awk '/chosen {/,/};/' build/zephyr/zephyr.dts || true

      - name: Run YOUR firmware in QEMU manually
        run: |
          rm -f qemu_execution_report.txt
          rm -f qemu_stdout.log
          rm -f qemu_stderr.log
          rm -f qemu_uart0.log
          rm -f qemu_uart1.log
          rm -f qemu_uart2.log
          rm -f qemu_uart3.log
          rm -f qemu_uart4.log
          rm -f qemu_uart5.log
          rm -f qemu_uart6.log
          rm -f qemu_uart7.log

          set +e
          timeout 60s qemu-system-arm \
            -machine olimex-stm32-h405 \
            -cpu cortex-m4 \
            -display none \
            -monitor none \
            -semihosting-config enable=on,target=native \
            -kernel build/zephyr/zephyr.elf \
            -serial file:qemu_uart0.log \
            -serial file:qemu_uart1.log \
            -serial file:qemu_uart2.log \
            -serial file:qemu_uart3.log \
            -serial file:qemu_uart4.log \
            -serial file:qemu_uart5.log \
            -serial file:qemu_uart6.log \
            -serial file:qemu_uart7.log \
            > qemu_stdout.log 2> qemu_stderr.log

          EXIT_CODE=$?
          set -e

          {
            echo "===== QEMU STDOUT - YOUR FIRMWARE ====="
            cat qemu_stdout.log || true
            echo ""

            echo "===== QEMU STDERR - YOUR FIRMWARE ====="
            cat qemu_stderr.log || true
            echo ""

            for i in 0 1 2 3 4 5 6 7; do
              echo "===== UART${i} - YOUR FIRMWARE ====="
              cat qemu_uart${i}.log || true
              echo ""
            done

            echo "===== EXIT CODE ====="
            echo "$EXIT_CODE"
          } > qemu_execution_report.txt

          cat qemu_execution_report.txt

          if grep -aEq "QEMU_PROBE_PRE_KERNEL_1|QEMU_PROBE_PRE_KERNEL_2|QEMU_PROBE_POST_KERNEL|QEMU_PROBE_APPLICATION_INIT|QEMU_BOOT_MARKER_ACTUAL_MAIN|QEMU_BOOT_MARKER_PRINTK|Command-Based RTOS Booting|MAIN_OS|SIM_I2C|Display Consumer" qemu_execution_report.txt; then
            echo "Your actual firmware started in QEMU and probe/log markers were captured."
            exit 0
          fi

          if [ "$EXIT_CODE" -eq 124 ]; then
            echo "Your actual firmware was launched in QEMU and ran until timeout, but no probe/application marker was captured."
            echo "This means the firmware is hanging before the earliest QEMU startup probe, or QEMU cannot expose semihost/UART output for this firmware."
            exit 1
          fi

          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "QEMU exited normally, but no firmware marker was captured."
            exit 1
          fi

          echo "Your firmware QEMU run failed with exit code $EXIT_CODE."
          exit 1

      - name: Upload QEMU execution logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: QEMU-Execution-Logs
          path: |
            qemu_execution_report.txt
            qemu_stdout.log
            qemu_stderr.log
            qemu_uart*.log
          if-no-files-found: ignore

      - name: Build and run host unit tests
        run: |
          if [ -f tests/CMakeLists.txt ]; then
            mkdir -p tests/build
            cd tests/build

            cmake ..
            make -j$(nproc)

            if [ -f ./run_pm_tests ]; then ./run_pm_tests; fi
            if [ -f ./run_usb_shell_tests ]; then ./run_usb_shell_tests; fi
            if [ -f ./run_battery_tests ]; then ./run_battery_tests; fi
            if [ -f ./run_static_memory_tests ]; then ./run_static_memory_tests; fi
            if [ -f ./run_config_tests ]; then ./run_config_tests; fi
            if [ -f ./run_i2c_faults_tests ]; then ./run_i2c_faults_tests; fi
            if [ -f ./run_state_machine_tests ]; then ./run_state_machine_tests; fi
            if [ -f ./run_sync_tests ]; then ./run_sync_tests; fi
            if [ -f ./run_command_tests ]; then ./run_command_tests; fi
          else
            echo "tests/CMakeLists.txt not found. Skipping host unit tests."
          fi

      - name: Enforce coverage
        run: |
          if [ -f ./scripts/check_coverage.sh ]; then
            chmod +x ./scripts/check_coverage.sh
            ./scripts/check_coverage.sh
          else
            echo "Coverage script not found. Skipping coverage enforcement."
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Coverage-Dashboard
          path: coverage_report/
          if-no-files-found: ignore
