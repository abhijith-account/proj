name: Zephyr Firmware CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  build-test-qemu:
    runs-on: ubuntu-latest
    container: zephyrprojectrtos/ci:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize Zephyr workspace
        run: |
          west init -l .
          west update
          west zephyr-export

          SDK_DIR=$(ls -d /opt/toolchains/zephyr-sdk-* | head -n 1)
          echo "Using Zephyr SDK: $SDK_DIR"
          $SDK_DIR/setup.sh -c

      - name: Install required packages
        run: |
          apt-get update
          apt-get install -y \
            qemu-system-arm \
            cmake \
            make \
            gcc \
            g++ \
            lcov \
            gcovr \
            libgtest-dev \
            binutils

      - name: Build your firmware for olimex_stm32_h405
        run: |
          west build -b olimex_stm32_h405 . --pristine

          echo ""
          echo "===== YOUR FIRMWARE IMAGE ====="
          ls -lh build/zephyr/zephyr.elf || true
          ls -lh build/zephyr/zephyr.bin || true

          echo ""
          echo "===== VERIFY YOUR MAIN MARKER EXISTS ====="
          strings build/zephyr/zephyr.elf | grep -E "QEMU_BOOT_MARKER|Command-Based RTOS Booting|MAIN_OS|SIM_I2C" || true

          echo ""
          echo "===== CONFIG SNAPSHOT ====="
          grep -E "CONFIG_BOARD|CONFIG_SERIAL|CONFIG_CONSOLE|CONFIG_UART_CONSOLE|CONFIG_LOG|CONFIG_LOG_BACKEND_UART|CONFIG_PRINTK|CONFIG_SHELL|CONFIG_USB|CONFIG_I2C|CONFIG_WATCHDOG|CONFIG_NVS|CONFIG_PM|CONFIG_FLASH|CONFIG_COUNTER|CONFIG_SEMIHOST" build/zephyr/.config || true

          echo ""
          echo "===== DEVICETREE CHOSEN NODE ====="
          awk '/chosen {/,/};/' build/zephyr/zephyr.dts || true

      - name: Run your firmware in QEMU using Zephyr runner
        run: |
          rm -f qemu_execution_report.txt
          rm -f qemu_stdout.log
          rm -f qemu_stderr.log

          set +e
          timeout 60s west build -t run > qemu_stdout.log 2> qemu_stderr.log
          EXIT_CODE=$?
          set -e

          {
            echo "===== QEMU STDOUT - YOUR FIRMWARE ====="
            cat qemu_stdout.log || true
            echo ""

            echo "===== QEMU STDERR - YOUR FIRMWARE ====="
            cat qemu_stderr.log || true
            echo ""

            echo "===== EXIT CODE ====="
            echo "$EXIT_CODE"
          } > qemu_execution_report.txt

          cat qemu_execution_report.txt

          if grep -aEq "QEMU_BOOT_MARKER|Booting Zephyr|Command-Based RTOS Booting|MAIN_OS|SIM_I2C|Display Consumer" qemu_execution_report.txt; then
            echo "Your firmware ran in QEMU and logs were captured."
            exit 0
          fi

          if [ "$EXIT_CODE" -eq 124 ]; then
            echo "Your firmware was started in QEMU and reached timeout, but no application log was captured."
            echo "This means your firmware is still hanging before main() or console output is not mapped by the board runner."
            exit 1
          fi

          echo "Your firmware QEMU run failed with exit code $EXIT_CODE."
          exit 1

      - name: Upload QEMU execution logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: QEMU-Execution-Logs
          path: |
            qemu_execution_report.txt
            qemu_stdout.log
            qemu_stderr.log
          if-no-files-found: ignore

      - name: Build and run host unit tests
        run: |
          if [ -f tests/CMakeLists.txt ]; then
            mkdir -p tests/build
            cd tests/build

            cmake ..
            make -j$(nproc)

            if [ -f ./run_pm_tests ]; then ./run_pm_tests; fi
            if [ -f ./run_usb_shell_tests ]; then ./run_usb_shell_tests; fi
            if [ -f ./run_battery_tests ]; then ./run_battery_tests; fi
            if [ -f ./run_static_memory_tests ]; then ./run_static_memory_tests; fi
            if [ -f ./run_config_tests ]; then ./run_config_tests; fi
            if [ -f ./run_i2c_faults_tests ]; then ./run_i2c_faults_tests; fi
            if [ -f ./run_state_machine_tests ]; then ./run_state_machine_tests; fi
            if [ -f ./run_sync_tests ]; then ./run_sync_tests; fi
            if [ -f ./run_command_tests ]; then ./run_command_tests; fi
          else
            echo "tests/CMakeLists.txt not found. Skipping host unit tests."
          fi

      - name: Enforce coverage
        run: |
          if [ -f ./scripts/check_coverage.sh ]; then
            chmod +x ./scripts/check_coverage.sh
            ./scripts/check_coverage.sh
          else
            echo "Coverage script not found. Skipping coverage enforcement."
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Coverage-Dashboard
          path: coverage_report/
          if-no-files-found: ignore
