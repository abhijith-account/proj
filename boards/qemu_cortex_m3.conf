# boards/qemu_cortex_m3.conf

# 1. Simulated Flash and NVS
CONFIG_FLASH=y
CONFIG_FLASH_SIMULATOR=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# 2. General Subsystems
CONFIG_REBOOT=y
CONFIG_COUNTER=y
CONFIG_I2C=y
CONFIG_WATCHDOG=y
CONFIG_WDT_DUMMY=y

# 3. Turn off USB
CONFIG_USB_DEVICE_STACK=n

# 4. Standard Console & C++ (Required from previous steps)
CONFIG_CPP=y
CONFIG_STD_CPP20=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
