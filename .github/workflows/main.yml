name: Zephyr Firmware CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  build-test-qemu:
    runs-on: ubuntu-latest
    container: zephyrprojectrtos/ci:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize Zephyr workspace
        run: |
          west init -l .
          west update
          west zephyr-export

          SDK_DIR=$(ls -d /opt/toolchains/zephyr-sdk-* | head -n 1)
          echo "Using Zephyr SDK: $SDK_DIR"
          $SDK_DIR/setup.sh -c

      - name: Install required packages
        run: |
          apt-get update
          apt-get install -y qemu-system-arm cmake make gcc g++ lcov gcovr libgtest-dev binutils

      - name: Compile for physical Nucleo F446RE
        run: |
          west build -b nucleo_f446re . --pristine

      - name: Compile and run STM32F405 firmware in QEMU
        run: |
          # QEMU does not officially support nucleo_f446re as a machine.
          # Use olimex_stm32_h405 because QEMU supports olimex-stm32-h405.

          west build -b olimex_stm32_h405 . --pristine

          echo "===== RESOLVED CHOSEN NODE ====="
          awk '/chosen {/,/};/' build/zephyr/zephyr.dts || true

          echo "===== UART / CONSOLE CONFIG ====="
          grep -E "CONFIG_SERIAL|CONFIG_CONSOLE|CONFIG_UART_CONSOLE|CONFIG_PRINTK|CONFIG_BOOT_BANNER|CONFIG_LOG|CONFIG_LOG_BACKEND_UART|CONFIG_LOG_MODE_IMMEDIATE" build/zephyr/.config || true

          echo "===== VERIFY BOOT MARKER EXISTS IN IMAGE ====="
          strings build/zephyr/zephyr.bin | grep "QEMU_BOOT_MARKER" || true

          rm -f qemu_execution_report.txt
          rm -f qemu_stderr.log
          rm -f qemu_uart_console.log

          set +e
          timeout 20s qemu-system-arm \
            -machine olimex-stm32-h405 \
            -cpu cortex-m4 \
            -display none \
            -monitor none \
            -kernel build/zephyr/zephyr.bin \
            -serial null \
            -serial stdio \
            > qemu_uart_console.log 2> qemu_stderr.log

          EXIT_CODE=$?
          set -e

          {
            echo "===== QEMU STDERR ====="
            cat qemu_stderr.log || true
            echo ""
            echo "===== USART2 / UART CONSOLE ====="
            cat qemu_uart_console.log || true
          } > qemu_execution_report.txt

          cat qemu_execution_report.txt

          if grep -aEq "QEMU_BOOT_MARKER|Booting Zephyr|Command-Based RTOS Booting|MAIN_OS" qemu_execution_report.txt; then
            echo "UART boot logs were captured successfully."
            exit 0
          fi

          if [ "$EXIT_CODE" -eq 124 ]; then
            echo "QEMU reached timeout, but UART boot marker was not captured."
            echo "Expected marker was not found in qemu_uart_console.log."
            exit 1
          elif [ "$EXIT_CODE" -eq 0 ]; then
            echo "QEMU exited normally, but UART boot marker was not captured."
            exit 1
          else
            echo "Firmware crashed or QEMU failed with code $EXIT_CODE."
            exit 1
          fi

      - name: Upload QEMU execution logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: QEMU-Execution-Logs
          path: |
            qemu_execution_report.txt
            qemu_stderr.log
            qemu_uart_console.log
          if-no-files-found: ignore

      - name: Build and run host unit tests
        run: |
          mkdir -p tests/build
          cd tests/build

          cmake ..
          make -j$(nproc)

          if [ -f ./run_pm_tests ]; then ./run_pm_tests; fi
          if [ -f ./run_usb_shell_tests ]; then ./run_usb_shell_tests; fi
          if [ -f ./run_battery_tests ]; then ./run_battery_tests; fi
          if [ -f ./run_static_memory_tests ]; then ./run_static_memory_tests; fi
          if [ -f ./run_config_tests ]; then ./run_config_tests; fi
          if [ -f ./run_i2c_faults_tests ]; then ./run_i2c_faults_tests; fi
          if [ -f ./run_state_machine_tests ]; then ./run_state_machine_tests; fi
          if [ -f ./run_sync_tests ]; then ./run_sync_tests; fi
          if [ -f ./run_command_tests ]; then ./run_command_tests; fi

      - name: Enforce coverage
        run: |
          if [ -f ./scripts/check_coverage.sh ]; then
            chmod +x ./scripts/check_coverage.sh
            ./scripts/check_coverage.sh
          else
            echo "Coverage script not found. Skipping coverage enforcement."
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Coverage-Dashboard
          path: coverage_report/
          if-no-files-found: ignore
