# boards/olimex_stm32_h405.conf

# QEMU smoke build only.
# Keep only UART/console/printk active.

CONFIG_CPP=y
CONFIG_STD_CPP20=y

CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_BOOT_BANNER=y

CONFIG_LOG=n
CONFIG_SHELL=n

CONFIG_USB_DEVICE_STACK=n
CONFIG_UART_INTERRUPT_DRIVEN=n
CONFIG_UART_LINE_CTRL=n

CONFIG_I2C=n
CONFIG_SENSOR=n

CONFIG_COUNTER=n
CONFIG_COUNTER_RTC_STM32=n

CONFIG_WATCHDOG=n

CONFIG_PM=n
CONFIG_PM_DEVICE=n

CONFIG_FLASH=n
CONFIG_FLASH_PAGE_LAYOUT=n
CONFIG_NVS=n
CONFIG_MPU_ALLOW_FLASH_WRITE=n

CONFIG_THREAD_ANALYZER=n
CONFIG_THREAD_NAME=n

CONFIG_HEAP_MEM_POOL_SIZE=0
