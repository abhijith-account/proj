# boards/qemu_cortex_m3.conf

# 1. Simulated Flash and NVS
CONFIG_FLASH=y
CONFIG_FLASH_SIMULATOR=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# 2. General Subsystems
CONFIG_REBOOT=y
CONFIG_COUNTER=y
CONFIG_I2C=y
CONFIG_TEST_RANDOM_GENERATOR=y

# 3. Standard Console & C++ (Required for QEMU output)
CONFIG_CPP=y
CONFIG_STD_CPP20=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y

# 4. THE FIX: Inject the Olimex macro to trigger your C++ mock #ifdef blocks
CONFIG_COMPILER_OPT="-DCONFIG_BOARD_OLIMEX_STM32_H405=1"
