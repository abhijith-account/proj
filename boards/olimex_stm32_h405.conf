# boards/olimex_stm32_p405.conf

# QEMU does not emulate USB device stack for this board
CONFIG_USB_DEVICE_STACK=n

# Keep serial console active
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Force logs immediately to UART during QEMU run
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_PRINTK=y
CONFIG_BOOT_BANNER=y

# Disable Zephyr's built-in serial shell backend in QEMU.
# Your app already has its own shell facade, and sharing UART can disturb logs.
CONFIG_SHELL_BACKEND_SERIAL=n
