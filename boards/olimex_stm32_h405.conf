# boards/olimex_stm32_h405.conf
# QEMU-safe configuration for olimex_stm32_h405.
# Purpose: run application/RTOS logic without STM32 RCC-dependent hardware drivers.

CONFIG_CPP=y
CONFIG_STD_CPP20=y

# QEMU output is through direct ARM semihosting probe.
CONFIG_SERIAL=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_LOG=n
CONFIG_LOG_BACKEND_UART=n
CONFIG_PRINTK=y
CONFIG_BOOT_BANNER=n

# Disable shell/USB/UART backend paths.
CONFIG_USB_DEVICE_STACK=n
CONFIG_SHELL=n
CONFIG_SHELL_BACKEND_SERIAL=n

# Disable STM32 hardware drivers that depend on RCC/clock-control.
CONFIG_CLOCK_CONTROL=n
CONFIG_GPIO=n
CONFIG_I2C=n
CONFIG_SENSOR=n
CONFIG_WATCHDOG=n
CONFIG_COUNTER=n
CONFIG_COUNTER_RTC_STM32=n
CONFIG_FLASH=n
CONFIG_FLASH_PAGE_LAYOUT=n
CONFIG_NVS=n
CONFIG_PM=n
CONFIG_PM_DEVICE=n

# Disable entropy/RNG path that still tries to use the STM32 clock device.
CONFIG_ENTROPY_GENERATOR=n
CONFIG_ENTROPY_STM32_RNG=n
CONFIG_TEST_RANDOM_GENERATOR=y

CONFIG_REBOOT=y

CONFIG_THREAD_NAME=y
CONFIG_THREAD_ANALYZER=n
CONFIG_THREAD_ANALYZER_AUTO=n
CONFIG_THREAD_ANALYZER_RUN_UNLOCKED=n
