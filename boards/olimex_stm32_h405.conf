# boards/olimex_stm32_h405.conf

CONFIG_CPP=y
CONFIG_STD_CPP20=y

# Use semihosting for QEMU output.
CONFIG_SEMIHOST=y

# Keep printk available.
CONFIG_PRINTK=y

# Disable UART console for QEMU.
# We are not depending on STM32 USART output now.
CONFIG_SERIAL=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n

# Logging off for smoke test; semihost output is direct.
CONFIG_LOG=n
CONFIG_LOG_BACKEND_UART=n

# USB disabled for QEMU.
CONFIG_USB_DEVICE_STACK=n

# Shell disabled for QEMU.
CONFIG_SHELL=n
CONFIG_SHELL_BACKEND_SERIAL=n

# Disable hardware peripherals that are not required for QEMU smoke.
CONFIG_UART_INTERRUPT_DRIVEN=n
CONFIG_UART_LINE_CTRL=n

CONFIG_I2C=n
CONFIG_SENSOR=n

CONFIG_COUNTER=n
CONFIG_COUNTER_RTC_STM32=n

CONFIG_WATCHDOG=n

CONFIG_PM=n
CONFIG_PM_DEVICE=n

CONFIG_FLASH=n
CONFIG_FLASH_PAGE_LAYOUT=n
CONFIG_NVS=n
CONFIG_MPU_ALLOW_FLASH_WRITE=n

CONFIG_THREAD_ANALYZER=n
CONFIG_THREAD_ANALYZER_RUN_UNLOCKED=n
CONFIG_THREAD_NAME=n

CONFIG_HEAP_MEM_POOL_SIZE=0
