# 1. Simulated Flash and NVS
CONFIG_FLASH=y
CONFIG_FLASH_SIMULATOR=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# 2. General Subsystems
CONFIG_REBOOT=y
CONFIG_COUNTER=y
CONFIG_I2C=y
CONFIG_WATCHDOG=y

# 3. Enable Dummy Drivers (Crucial for the Linker)
# These generate the C-structs for our "vnd" fake hardware
CONFIG_I2C_TEST=y
CONFIG_WDT_DUMMY=y

# 4. Turn off USB
CONFIG_USB_DEVICE_STACK=n
