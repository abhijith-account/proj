# boards/olimex_stm32_h405.conf

# QEMU does not emulate USB device stack for this board.
CONFIG_USB_DEVICE_STACK=n

# Serial console/logging for QEMU.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_BOOT_BANNER=y

# Do not enable Zephyr serial shell backend in QEMU.
# Your application already has its own USB/UART shell facade.
CONFIG_SHELL_BACKEND_SERIAL=n

# Avoid warning from prj.conf when serial shell backend is disabled.
# Do not set CONFIG_SHELL_PROMPT_UART here.
