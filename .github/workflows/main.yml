name: proj

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    container: zephyrprojectrtos/ci:latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize Zephyr Workspace
        run: |
          west init -l .
          west update
          west zephyr-export

          SDK_DIR=$(ls -d /opt/toolchains/zephyr-sdk-* | head -n 1)
          $SDK_DIR/setup.sh -c

      - name: Install System Dependencies
        run: |
          apt-get update
          apt-get install -y qemu-system-arm libgtest-dev

      - name: Cross Compile for Physical STM32 ARM
        run: |
          west build -b nucleo_f446re . --pristine

      - name: Emulation Test via QEMU STM32F405
        run: |
          # 1. Compile firmware for STM32F405 target
          west build -b olimex_stm32_p405 . --pristine

          # 2. Clean old QEMU logs
          rm -f qemu_execution_report.txt
          rm -f qemu_stderr.log
          rm -f qemu_uart0.log
          rm -f qemu_uart1.log

          # 3. Run QEMU
          # 124 from timeout means firmware kept running, which is expected.
          set +e
          timeout 20s qemu-system-arm \
          -machine netduinoplus2 \
          -cpu cortex-m4 \
          -display none \
          -monitor none \
          -kernel build/zephyr/zephyr.elf \
          -serial file:qemu_uart0.log \
          -serial file:qemu_uart1.log \
          > qemu_stderr.log 2>&1

          EXIT_CODE=$?
          set -e

          # 4. Combine output into final report
          {
            echo "===== QEMU STDERR ====="
            cat qemu_stderr.log || true
            echo ""
            echo "===== UART0 ====="
            cat qemu_uart0.log || true
            echo ""
            echo "===== UART1 ====="
            cat qemu_uart1.log || true
          } > qemu_execution_report.txt

          cat qemu_execution_report.txt

          # 5. Evaluate result
          if [ "$EXIT_CODE" -eq 124 ]; then
            echo "Firmware survived QEMU execution until timeout. Treating as success."
            exit 0
          elif [ "$EXIT_CODE" -eq 0 ]; then
            echo "QEMU exited normally."
            exit 0
          else
            echo "Firmware crashed or QEMU failed with code $EXIT_CODE."
            exit 1
          fi

      - name: Archive QEMU Execution Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: QEMU-Execution-Log
          path: |
            qemu_execution_report.txt
            qemu_stderr.log
            qemu_uart0.log
            qemu_uart1.log
          if-no-files-found: ignore

      - name: Host GTest and Coverage Generation
        run: |
          mkdir -p tests/build
          cd tests/build

          cmake ..
          make -j$(nproc)

          ./run_pm_tests
          ./run_usb_shell_tests
          ./run_battery_tests
          ./run_static_memory_tests
          ./run_config_tests
          ./run_i2c_faults_tests
          ./run_state_machine_tests
          ./run_sync_tests
          ./run_command_tests

      - name: Enforce 100 Percent Line and Branch Coverage
        run: |
          chmod +x ./scripts/check_coverage.sh
          ./scripts/check_coverage.sh

      - name: Archive Coverage HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Coverage-Dashboard
          path: coverage_report/
          if-no-files-found: ignore
