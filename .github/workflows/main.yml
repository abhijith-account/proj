name: Zephyr Firmware CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  build-test-qemu:
    runs-on: ubuntu-latest
    container: zephyrprojectrtos/ci:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize Zephyr workspace
        run: |
          west init -l .
          west update
          west zephyr-export

          SDK_DIR=$(ls -d /opt/toolchains/zephyr-sdk-* | head -n 1)
          echo "Using Zephyr SDK: $SDK_DIR"
          $SDK_DIR/setup.sh -c

      - name: Install required packages
        run: |
          apt-get update
          apt-get install -y \
            qemu-system-arm \
            cmake \
            make \
            gcc \
            g++ \
            lcov \
            gcovr \
            libgtest-dev \
            binutils

      - name: Build Zephyr firmware for olimex_stm32_h405
        run: |
          # Build your actual Zephyr firmware for the STM32F405 board.
          # This validates that the real firmware compiles for your board.
          west build -b olimex_stm32_h405 . --pristine

          echo ""
          echo "===== FIRMWARE IMAGE CHECK ====="
          ls -lh build/zephyr/zephyr.elf || true
          ls -lh build/zephyr/zephyr.bin || true

          echo ""
          echo "===== IMAGE STRINGS CHECK ====="
          strings build/zephyr/zephyr.elf | grep -E "QEMU_BOOT_MARKER|Command-Based RTOS Booting|MAIN_OS" || true

          echo ""
          echo "===== CONFIG SNAPSHOT ====="
          grep -E "CONFIG_BOARD|CONFIG_SERIAL|CONFIG_CONSOLE|CONFIG_UART_CONSOLE|CONFIG_LOG|CONFIG_SEMIHOST|CONFIG_I2C|CONFIG_WATCHDOG|CONFIG_NVS|CONFIG_PM|CONFIG_FLASH" build/zephyr/.config || true

      - name: Bare-metal QEMU smoke test on olimex-stm32-h405
        run: |
          # This does NOT use qemu_cortex_m3.
          # It runs directly on QEMU machine: olimex-stm32-h405.
          # Purpose: prove QEMU execution and output capture are working.

          cat > qemu_h405_smoke.c <<'EOF'
          #include <stdint.h>

          #define SYS_WRITE0 0x04

          static void semihost_write0(const char *s)
          {
              register uint32_t r0 __asm__("r0") = SYS_WRITE0;
              register const char *r1 __asm__("r1") = s;

              __asm__ volatile (
                  "bkpt 0xab"
                  :
                  : "r"(r0), "r"(r1)
                  : "memory"
              );
          }

          void Reset_Handler(void)
          {
              while (1) {
                  semihost_write0("QEMU_BOOT_MARKER\n");

                  for (volatile uint32_t i = 0; i < 1000000; i++) {
                      __asm__ volatile ("nop");
                  }
              }
          }

          void Default_Handler(void)
          {
              while (1) {
              }
          }

          __attribute__((section(".isr_vector")))
          const uintptr_t vector_table[] = {
              0x20020000,
              (uintptr_t)Reset_Handler,
              (uintptr_t)Default_Handler,
              (uintptr_t)Default_Handler,
              (uintptr_t)Default_Handler,
              (uintptr_t)Default_Handler,
              (uintptr_t)Default_Handler,
              0,
              0,
              0,
              0,
              (uintptr_t)Default_Handler,
              (uintptr_t)Default_Handler,
              0,
              (uintptr_t)Default_Handler,
              (uintptr_t)Default_Handler
          };
          EOF

          cat > qemu_h405_smoke.ld <<'EOF'
          ENTRY(Reset_Handler)

          MEMORY
          {
              FLASH (rx)  : ORIGIN = 0x08000000, LENGTH = 1024K
              RAM   (rwx) : ORIGIN = 0x20000000, LENGTH = 128K
          }

          SECTIONS
          {
              .isr_vector :
              {
                  KEEP(*(.isr_vector))
              } > FLASH

              .text :
              {
                  *(.text*)
                  *(.rodata*)
              } > FLASH

              .data :
              {
                  *(.data*)
              } > RAM AT > FLASH

              .bss :
              {
                  *(.bss*)
                  *(COMMON)
              } > RAM
          }
          EOF

          echo ""
          echo "===== LOCATE ARM TOOLCHAIN ====="

          ARM_GCC=$(find /opt/toolchains -type f -name arm-zephyr-eabi-gcc | head -n 1)
          ARM_OBJDUMP=$(find /opt/toolchains -type f -name arm-zephyr-eabi-objdump | head -n 1)

          echo "Using ARM GCC: $ARM_GCC"
          echo "Using ARM OBJDUMP: $ARM_OBJDUMP"

          if [ -z "$ARM_GCC" ]; then
            echo "arm-zephyr-eabi-gcc not found under /opt/toolchains"
            exit 1
          fi

          echo ""
          echo "===== BUILD BARE-METAL QEMU SMOKE ELF ====="

          "$ARM_GCC" \
            -mcpu=cortex-m4 \
            -mthumb \
            -nostdlib \
            -ffreestanding \
            -Wl,-T,qemu_h405_smoke.ld \
            -Wl,-Map,qemu_h405_smoke.map \
            -o qemu_h405_smoke.elf \
            qemu_h405_smoke.c

          echo ""
          echo "===== SMOKE ELF CHECK ====="
          ls -lh qemu_h405_smoke.elf

          if [ -n "$ARM_OBJDUMP" ]; then
            "$ARM_OBJDUMP" -h qemu_h405_smoke.elf || true
          else
            echo "arm-zephyr-eabi-objdump not found. Skipping objdump."
          fi

          strings qemu_h405_smoke.elf | grep "QEMU_BOOT_MARKER" || true

          rm -f qemu_execution_report.txt
          rm -f qemu_semihost.log
          rm -f qemu_stderr.log

          echo ""
          echo "===== RUN QEMU STM32F405 MACHINE ====="

          set +e
          timeout 10s qemu-system-arm \
            -machine olimex-stm32-h405 \
            -cpu cortex-m4 \
            -display none \
            -monitor none \
            -semihosting-config enable=on,target=native \
            -kernel qemu_h405_smoke.elf \
            > qemu_semihost.log 2> qemu_stderr.log

          EXIT_CODE=$?
          set -e

          {
            echo "===== QEMU STDERR ====="
            cat qemu_stderr.log || true
            echo ""

            echo "===== QEMU SEMIHOST OUTPUT ====="
            cat qemu_semihost.log || true
            echo ""

            echo "===== EXIT CODE ====="
            echo "$EXIT_CODE"
          } > qemu_execution_report.txt

          cat qemu_execution_report.txt

          if grep -aEq "QEMU_BOOT_MARKER" qemu_execution_report.txt; then
            echo "QEMU olimex-stm32-h405 smoke output captured successfully."
            exit 0
          fi

          echo "QEMU olimex-stm32-h405 smoke marker was not captured."
          exit 1

      - name: Upload QEMU execution logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: QEMU-Execution-Logs
          path: |
            qemu_execution_report.txt
            qemu_stderr.log
            qemu_semihost.log
            qemu_h405_smoke.c
            qemu_h405_smoke.ld
            qemu_h405_smoke.elf
            qemu_h405_smoke.map
          if-no-files-found: ignore

      - name: Build and run host unit tests
        run: |
          if [ -f tests/CMakeLists.txt ]; then
            mkdir -p tests/build
            cd tests/build

            cmake ..
            make -j$(nproc)

            if [ -f ./run_pm_tests ]; then ./run_pm_tests; fi
            if [ -f ./run_usb_shell_tests ]; then ./run_usb_shell_tests; fi
            if [ -f ./run_battery_tests ]; then ./run_battery_tests; fi
            if [ -f ./run_static_memory_tests ]; then ./run_static_memory_tests; fi
            if [ -f ./run_config_tests ]; then ./run_config_tests; fi
            if [ -f ./run_i2c_faults_tests ]; then ./run_i2c_faults_tests; fi
            if [ -f ./run_state_machine_tests ]; then ./run_state_machine_tests; fi
            if [ -f ./run_sync_tests ]; then ./run_sync_tests; fi
            if [ -f ./run_command_tests ]; then ./run_command_tests; fi
          else
            echo "tests/CMakeLists.txt not found. Skipping host unit tests."
          fi

      - name: Enforce coverage
        run: |
          if [ -f ./scripts/check_coverage.sh ]; then
            chmod +x ./scripts/check_coverage.sh
            ./scripts/check_coverage.sh
          else
            echo "Coverage script not found. Skipping coverage enforcement."
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Coverage-Dashboard
          path: coverage_report/
          if-no-files-found: ignore
