# Enable Simulated Flash and NVS mapping
CONFIG_FLASH=y
CONFIG_FLASH_SIMULATOR=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y

# Enable subsystems used by the shell and Power Manager
CONFIG_REBOOT=y
CONFIG_COUNTER=y
CONFIG_I2C=y
CONFIG_WATCHDOG=y

# Turn off USB because QEMU has no USB hardware controller
CONFIG_USB_DEVICE_STACK=n
