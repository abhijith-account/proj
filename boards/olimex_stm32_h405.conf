# boards/olimex_stm32_h405.conf

# QEMU build for actual olimex_stm32_h405 firmware.

CONFIG_CPP=y
CONFIG_STD_CPP20=y

# UART console / printk / logging
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_BOOT_BANNER=y

CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_IMMEDIATE=y

# USB disabled because QEMU does not emulate USB device stack for this board.
CONFIG_USB_DEVICE_STACK=n

# Your USB shell facade is mapped to USART2 through cdc-acm-uart0 alias.
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y

# Shell backend can remain disabled for QEMU to avoid conflict.
CONFIG_SHELL_BACKEND_SERIAL=n

# Keep real firmware features enabled because your source files use them.
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_NVS=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

CONFIG_I2C=y
CONFIG_SENSOR=y

CONFIG_COUNTER=y
CONFIG_COUNTER_RTC_STM32=y

CONFIG_WATCHDOG=y

CONFIG_PM=y
CONFIG_PM_DEVICE=y

CONFIG_REBOOT=y

CONFIG_THREAD_NAME=y
CONFIG_THREAD_ANALYZER=y
CONFIG_THREAD_ANALYZER_AUTO=n
CONFIG_THREAD_ANALYZER_RUN_UNLOCKED=y

# Optional: avoid Kconfig STACK_CANARIES warning on this Zephyr version.
# If prj.conf has CONFIG_STACK_CANARIES=y and warning continues,
# remove it from prj.conf for H405 QEMU build.
