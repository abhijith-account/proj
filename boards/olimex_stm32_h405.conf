# boards/olimex_stm32_h405.conf

# QEMU smoke/runtime profile for STM32F405.

CONFIG_CPP=y
CONFIG_STD_CPP20=y

# Console / printk
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_BOOT_BANNER=y

# Keep logging enabled to avoid LOG_BACKEND_UART warning.
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_IMMEDIATE=y

# USB is not emulated.
CONFIG_USB_DEVICE_STACK=n

# Avoid Zephyr shell consuming UART during QEMU smoke test.
CONFIG_SHELL=n
CONFIG_SHELL_BACKEND_SERIAL=n

# UART interrupt APIs not needed for QEMU smoke if using simple printk.
CONFIG_UART_INTERRUPT_DRIVEN=n
CONFIG_UART_LINE_CTRL=n

# Disable non-emulated / unreliable STM32 peripherals in QEMU.
CONFIG_I2C=n
CONFIG_SENSOR=n

CONFIG_COUNTER=n
CONFIG_COUNTER_RTC_STM32=n

CONFIG_WATCHDOG=n

CONFIG_PM=n
CONFIG_PM_DEVICE=n

CONFIG_FLASH=n
CONFIG_FLASH_PAGE_LAYOUT=n
CONFIG_NVS=n
CONFIG_MPU_ALLOW_FLASH_WRITE=n

# Remove thread analyzer warning.
CONFIG_THREAD_ANALYZER=n
CONFIG_THREAD_ANALYZER_RUN_UNLOCKED=n
CONFIG_THREAD_NAME=n

CONFIG_HEAP_MEM_POOL_SIZE=0
