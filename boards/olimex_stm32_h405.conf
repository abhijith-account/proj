# boards/olimex_stm32_h405.conf

# QEMU does not emulate USB device stack for this board.
CONFIG_USB_DEVICE_STACK=n

# Force UART console.
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_BOOT_BANNER=y

# Make logs immediate.
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_IMMEDIATE=y

# Required by USB_CDC_Virtual_COM_Shell_Interface.cpp
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_LINE_CTRL=y

# Disable Zephyr built-in serial shell backend in QEMU.
# Your own shell facade is already compiled.
CONFIG_SHELL_BACKEND_SERIAL=n
