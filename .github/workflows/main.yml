name: Zephyr Firmware CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

jobs:
  build-test-qemu:
    runs-on: ubuntu-latest
    container: zephyrprojectrtos/ci:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize Zephyr workspace
        run: |
          west init -l .
          west update
          west zephyr-export

          SDK_DIR=$(ls -d /opt/toolchains/zephyr-sdk-* | head -n 1)
          echo "Using Zephyr SDK: $SDK_DIR"
          $SDK_DIR/setup.sh -c

      - name: Install required packages
        run: |
          apt-get update
          apt-get install -y \
            qemu-system-arm \
            cmake \
            make \
            gcc \
            g++ \
            lcov \
            gcovr \
            libgtest-dev \
            binutils

      - name: Build YOUR firmware for olimex_stm32_h405 with granular startup probe
        run: |
          west build -b olimex_stm32_h405 . --pristine -- -DQEMU_RUNTIME_PROBE=ON

          echo ""
          echo "===== YOUR FIRMWARE IMAGE ====="
          ls -lh build/zephyr/zephyr.elf || true
          ls -lh build/zephyr/zephyr.bin || true
          ls -lh build/zephyr/zephyr.map || true

          echo ""
          echo "===== VERIFY PROBE / APPLICATION STRINGS EXIST IN YOUR ELF ====="
          strings build/zephyr/zephyr.elf | grep -E "QEMU_PROBE_PRE_KERNEL_1_P0|QEMU_PROBE_PRE_KERNEL_1_P1|QEMU_PROBE_PRE_KERNEL_1_P2|QEMU_PROBE_PRE_KERNEL_1_P3|QEMU_PROBE_PRE_KERNEL_1_P4|QEMU_PROBE_PRE_KERNEL_1_P5|QEMU_PROBE_PRE_KERNEL_1_P6|QEMU_PROBE_PRE_KERNEL_1_P7|QEMU_PROBE_PRE_KERNEL_1_P8|QEMU_PROBE_PRE_KERNEL_1_P9|QEMU_PROBE_PRE_KERNEL_1_P10|QEMU_PROBE_PRE_KERNEL_2_P0|QEMU_PROBE_POST_KERNEL_P0|QEMU_PROBE_APPLICATION_P0|QEMU_BOOT_MARKER_ACTUAL_MAIN|QEMU_BOOT_MARKER_PRINTK|Command-Based RTOS Booting|MAIN_OS|SIM_I2C|Display Consumer" || true

          echo ""
          echo "===== CONFIG SNAPSHOT ====="
          grep -E "CONFIG_BOARD|CONFIG_SERIAL|CONFIG_CONSOLE|CONFIG_UART_CONSOLE|CONFIG_LOG|CONFIG_LOG_BACKEND_UART|CONFIG_PRINTK|CONFIG_SHELL|CONFIG_USB|CONFIG_I2C|CONFIG_WATCHDOG|CONFIG_NVS|CONFIG_PM|CONFIG_FLASH|CONFIG_COUNTER|CONFIG_SEMIHOST|CONFIG_CLOCK_CONTROL|CONFIG_GPIO|CONFIG_ENTROPY|CONFIG_RESET|CONFIG_SYS_CLOCK|CONFIG_TICKLESS" build/zephyr/.config || true

          echo ""
          echo "===== DEVICETREE CHOSEN NODE ====="
          awk '/chosen {/,/};/' build/zephyr/zephyr.dts || true

          echo ""
          echo "===== DEVICETREE ENABLED EARLY DEVICES ====="
          grep -nE "status = \"okay\"|rcc|clk|clock|gpio|usart|uart|i2c|rtc|iwdg|flash|entropy|rng" build/zephyr/zephyr.dts || true

          echo ""
          echo "===== ZEPHYR INIT ORDER SYMBOLS ====="
          NM_TOOL=$(find /opt/toolchains -name arm-zephyr-eabi-nm | head -n 1)
          echo "Using nm: ${NM_TOOL}"
          if [ -n "${NM_TOOL}" ]; then
            "${NM_TOOL}" -n build/zephyr/zephyr.elf | grep -E "init|qemu_probe|clock|rcc|gpio|uart|usart|i2c|flash|rtc|wdt|iwdg|entropy|rng|reset|stm32" || true
          fi

          echo ""
          echo "===== LINKER MAP INIT / DRIVER SECTIONS ====="
          grep -nE "qemu_probe|PRE_KERNEL|POST_KERNEL|APPLICATION|clock|rcc|gpio|uart|usart|i2c|flash|rtc|wdt|iwdg|entropy|rng|reset|stm32" build/zephyr/zephyr.map || true

      - name: Run YOUR firmware in QEMU manually
        run: |
          rm -f qemu_execution_report.txt
          rm -f qemu_stdout.log
          rm -f qemu_stderr.log
          rm -f qemu_uart0.log
          rm -f qemu_uart1.log
          rm -f qemu_uart2.log
          rm -f qemu_uart3.log
          rm -f qemu_uart4.log
          rm -f qemu_uart5.log
          rm -f qemu_uart6.log
          rm -f qemu_uart7.log

          set +e
          timeout 60s qemu-system-arm \
            -machine olimex-stm32-h405 \
            -cpu cortex-m4 \
            -display none \
            -monitor none \
            -semihosting-config enable=on,target=native \
            -kernel build/zephyr/zephyr.elf \
            -serial file:qemu_uart0.log \
            -serial file:qemu_uart1.log \
            -serial file:qemu_uart2.log \
            -serial file:qemu_uart3.log \
            -serial file:qemu_uart4.log \
            -serial file:qemu_uart5.log \
            -serial file:qemu_uart6.log \
            -serial file:qemu_uart7.log \
            > qemu_stdout.log 2> qemu_stderr.log

          EXIT_CODE=$?
          set -e

          {
            echo "===== QEMU STDOUT - YOUR FIRMWARE ====="
            cat qemu_stdout.log || true
            echo ""

            echo "===== QEMU STDERR - YOUR FIRMWARE ====="
            cat qemu_stderr.log || true
            echo ""

            for i in 0 1 2 3 4 5 6 7; do
              echo "===== UART${i} - YOUR FIRMWARE ====="
              cat qemu_uart${i}.log || true
              echo ""
            done

            echo "===== EXIT CODE ====="
            echo "$EXIT_CODE"
          } > qemu_execution_report.txt

          cat qemu_execution_report.txt

          echo ""
          echo "===== QEMU RESULT CLASSIFICATION ====="

          if grep -aEq "QEMU_BOOT_MARKER_ACTUAL_MAIN|QEMU_BOOT_MARKER_PRINTK|Command-Based RTOS Booting|MAIN_OS|SIM_I2C|Display Consumer" qemu_execution_report.txt; then
            echo "PASS: Your actual application main() ran in QEMU."
            exit 0
          fi

          if grep -aEq "QEMU_PROBE_APPLICATION_P0|QEMU_PROBE_POST_KERNEL_P0|QEMU_PROBE_PRE_KERNEL_2_P0" qemu_execution_report.txt; then
            echo "PASS: Your actual firmware reached late Zephyr init stages, but main() was not confirmed."
            exit 0
          fi

          if grep -aEq "QEMU_PROBE_PRE_KERNEL_1_P10" qemu_execution_report.txt; then
            echo "FAIL: Firmware reached PRE_KERNEL_1 priority 10 but did not reach PRE_KERNEL_2."
            exit 1
          fi

          if grep -aEq "QEMU_PROBE_PRE_KERNEL_1_P9" qemu_execution_report.txt; then
            echo "FAIL: Firmware reached PRE_KERNEL_1 priority 9 but stopped before priority 10."
            exit 1
          fi

          if grep -aEq "QEMU_PROBE_PRE_KERNEL_1_P8" qemu_execution_report.txt; then
            echo "FAIL: Firmware reached PRE_KERNEL_1 priority 8 but stopped before priority 9."
            exit 1
          fi

          if grep -aEq "QEMU_PROBE_PRE_KERNEL_1_P7" qemu_execution_report.txt; then
            echo "FAIL: Firmware reached PRE_KERNEL_1 priority 7 but stopped before priority 8."
            exit 1
          fi

          if grep -aEq "QEMU_PROBE_PRE_KERNEL_1_P6" qemu_execution_report.txt; then
            echo "FAIL: Firmware reached PRE_KERNEL_1 priority 6 but stopped before priority 7."
            exit 1
          fi

          if grep -aEq "QEMU_PROBE_PRE_KERNEL_1_P5" qemu_execution_report.txt; then
            echo "FAIL: Firmware reached PRE_KERNEL_1 priority 5 but stopped before priority 6."
            exit 1
          fi

          if grep -aEq "QEMU_PROBE_PRE_KERNEL_1_P4" qemu_execution_report.txt; then
            echo "FAIL: Firmware reached PRE_KERNEL_1 priority 4 but stopped before priority 5."
            exit 1
          fi

          if grep -aEq "QEMU_PROBE_PRE_KERNEL_1_P3" qemu_execution_report.txt; then
            echo "FAIL: Firmware reached PRE_KERNEL_1 priority 3 but stopped before priority 4."
            exit 1
          fi

          if grep -aEq "QEMU_PROBE_PRE_KERNEL_1_P2" qemu_execution_report.txt; then
            echo "FAIL: Firmware reached PRE_KERNEL_1 priority 2 but stopped before priority 3."
            exit 1
          fi

          if grep -aEq "QEMU_PROBE_PRE_KERNEL_1_P1" qemu_execution_report.txt; then
            echo "FAIL: Firmware reached PRE_KERNEL_1 priority 1 but stopped before priority 2."
            exit 1
          fi

          if grep -aEq "QEMU_PROBE_PRE_KERNEL_1_P0" qemu_execution_report.txt; then
            echo "FAIL: Firmware reached PRE_KERNEL_1 priority 0 only."
            echo "Likely hang is another PRE_KERNEL_1 priority 0 initializer after qemu_probe_pre_kernel_1_p0."
            echo "Check the linker map / init symbols printed in the previous build step."
            exit 1
          fi

          if [ "$EXIT_CODE" -eq 124 ]; then
            echo "FAIL: Your actual firmware was launched in QEMU but no probe/application marker was captured."
            exit 1
          fi

          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "FAIL: QEMU exited normally, but no firmware marker was captured."
            exit 1
          fi

          echo "FAIL: Your firmware QEMU run failed with exit code $EXIT_CODE."
          exit 1

      - name: Upload QEMU execution logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: QEMU-Execution-Logs
          path: |
            qemu_execution_report.txt
            qemu_stdout.log
            qemu_stderr.log
            qemu_uart*.log
            build/zephyr/zephyr.map
            build/zephyr/zephyr.dts
            build/zephyr/.config
          if-no-files-found: ignore

      - name: Build and run host unit tests
        run: |
          if [ -f tests/CMakeLists.txt ]; then
            mkdir -p tests/build
            cd tests/build

            cmake ..
            make -j$(nproc)

            if [ -f ./run_pm_tests ]; then ./run_pm_tests; fi
            if [ -f ./run_usb_shell_tests ]; then ./run_usb_shell_tests; fi
            if [ -f ./run_battery_tests ]; then ./run_battery_tests; fi
            if [ -f ./run_static_memory_tests ]; then ./run_static_memory_tests; fi
            if [ -f ./run_config_tests ]; then ./run_config_tests; fi
            if [ -f ./run_i2c_faults_tests ]; then ./run_i2c_faults_tests; fi
            if [ -f ./run_state_machine_tests ]; then ./run_state_machine_tests; fi
            if [ -f ./run_sync_tests ]; then ./run_sync_tests; fi
            if [ -f ./run_command_tests ]; then ./run_command_tests; fi
          else
            echo "tests/CMakeLists.txt not found. Skipping host unit tests."
          fi

      - name: Enforce coverage
        run: |
          if [ -f ./scripts/check_coverage.sh ]; then
            chmod +x ./scripts/check_coverage.sh
            ./scripts/check_coverage.sh
          else
            echo "Coverage script not found. Skipping coverage enforcement."
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Coverage-Dashboard
          path: coverage_report/
          if-no-files-found: ignore
