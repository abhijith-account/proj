# boards/olimex_stm32_h405.conf
# QEMU-safe configuration for olimex_stm32_h405.
# Purpose: run application/RTOS logic without STM32 RCC-dependent hardware drivers.

CONFIG_CPP=y
CONFIG_STD_CPP20=y

# We use direct ARM semihosting probe, not UART console.
CONFIG_SERIAL=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_LOG=n
CONFIG_PRINTK=y
CONFIG_BOOT_BANNER=n

# Disable STM32 clock-control dependent drivers.
CONFIG_CLOCK_CONTROL=n
CONFIG_GPIO=n
CONFIG_I2C=n
CONFIG_SENSOR=n
CONFIG_WATCHDOG=n
CONFIG_COUNTER=n
CONFIG_COUNTER_RTC_STM32=n
CONFIG_FLASH=n
CONFIG_FLASH_PAGE_LAYOUT=n
CONFIG_NVS=n
CONFIG_PM=n
CONFIG_PM_DEVICE=n
CONFIG_USB_DEVICE_STACK=n
CONFIG_SHELL=n
CONFIG_SHELL_BACKEND_SERIAL=n

CONFIG_REBOOT=y

CONFIG_THREAD_NAME=y
CONFIG_THREAD_ANALYZER=n
CONFIG_THREAD_ANALYZER_AUTO=n
