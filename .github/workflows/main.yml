name: proj

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    container: zephyrprojectrtos/ci:latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Initialize Zephyr Workspace
        run: |
          west init -l .
          west update
          
          west zephyr-export
          
          SDK_DIR=$(ls -d /opt/toolchains/zephyr-sdk-* | head -n 1)
          $SDK_DIR/setup.sh -c
          
      - name: Cross Compile for Physical STM32 ARM
        run: |
          west build -b nucleo_f446re . --pristine
          
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtest-dev qemu-system-arm
      
      - name: Emulation Test via QEMU (STM32 Cortex-M4)
        run: |
          west build -b olimex_stm32_p405 . --pristine

          # 2. Run QEMU and explicitly load the Zephyr firmware image
          set +e
          timeout 20s qemu-system-arm \
          -machine netduinoplus2 \
          -cpu cortex-m4 \
          -display none \
          -monitor none \
          -kernel build/zephyr/zephyr.elf \
          -serial stdio \
          -serial null \
          > qemu_execution_report.txt 2>&1

          # 3. Capture exit code
          EXIT_CODE=$?
          set -e

          # 4. Print QEMU report
          cat qemu_execution_report.txt

          # 5. 124 means firmware kept running until timeout, which is expected
          if [ $EXIT_CODE -eq 124 ]; then
             echo "Firmware booted successfully! (Hit timeout)"
             exit 0
          else
             echo "Firmware crashed with code $EXIT_CODE!"
             exit 1
          fi

      - name: Archive QEMU Execution Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: QEMU-Execution-Log
          path: qemu_execution_report.txt
      
      - name: Host GTest & Coverage Generation
        run: |
          mkdir -p tests/build
          cd tests/build
          cmake ..
          make -j$(nproc)
          
          ./run_pm_tests
          ./run_usb_shell_tests
          ./run_battery_tests
          ./run_static_memory_tests
          ./run_config_tests
          ./run_i2c_faults_tests
          ./run_state_machine_tests
          ./run_sync_tests
          ./run_command_tests
        
      - name: Enforce 100% Line + Branch Coverage
        run: |
          chmod +x ./scripts/check_coverage.sh
          ./scripts/check_coverage.sh
      
      - name: Archive Coverage HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Coverage-Dashboard
          path: coverage_report/
